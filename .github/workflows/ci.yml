name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-dummy-secret-not-for-production-use-only
      GROQ_API_KEY: gsk_ci_dummy_key
      DATABASE_URL: postgresql://user:password@localhost:5432/ci_dummy
      RESEND_API_KEY: re_ci_dummy_key
      RESEND_FROM_EMAIL: ci@example.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
