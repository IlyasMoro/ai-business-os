name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-dummy-secret-not-for-production-use-only
      GROQ_API_KEY: gsk_ci_dummy_key
      DATABASE_URL: postgresql://user:password@localhost:5432/ci_dummy
      RESEND_API_KEY: re_ci_dummy_key
      RESEND_FROM_EMAIL: ci@example.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JWT_SECRET: ci-dummy-secret-not-for-production-use-only
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ci-dummy-encryption-key-32-bytes-long
      GROQ_API_KEY: gsk_ci_dummy_key
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/e2e
      RESEND_API_KEY: re_ci_dummy_key
      RESEND_FROM_EMAIL: ci@example.com
      PLATFORM_ADMIN_EMAIL: e2e-platform-admin@example.com
      APP_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
